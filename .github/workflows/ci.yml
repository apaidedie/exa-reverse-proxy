name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify

      - name: Prepare Docker Compose inputs
        run: |
          cp .env.example .env
          printf '%s\n' 'ci_fake_exa_key' > exa_api_key.txt

      - name: Validate Docker Compose
        run: docker compose -f docker-compose.deploy.yml config --no-interpolate

      - name: Build Docker image
        run: docker compose build
