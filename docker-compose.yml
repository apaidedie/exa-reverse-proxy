# One-click deployment: copy .env.example → .env, configure your tokens, then run:
#   docker compose up -d
#
# Keys can be added via the admin API (POST /_proxy/keys) — stored encrypted in SQLite.
# For external access, place behind a reverse proxy (Caddy/Nginx) for HTTPS termination.

services:
  exa-proxy:
    image: al1ya/exa-reverse-proxy:latest
    container_name: exa-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env
    environment:
      EXA_STATE_PATH: /data/exa-proxy.sqlite
    volumes:
      - ./exa_proxy_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
