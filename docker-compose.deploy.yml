# One-click deployment: copy .env.example → .env, place your Exa keys in exa_api_key.txt, then run:
#   docker compose -f docker-compose.deploy.yml up -d
#
# For external access, change the port binding from "127.0.0.1:8787" to "8787"
# or place behind a reverse proxy (Caddy/Nginx) for HTTPS termination.

services:
  exa-proxy:
    image: al1ya/exa-reverse-proxy:latest
    container_name: exa-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      EXA_STATE_PATH: /data/exa-proxy.sqlite
      EXA_KEYS_FILE: /run/secrets/exa_api_key.txt
    volumes:
      - exa_proxy_data:/data
      - ./exa_api_key.txt:/run/secrets/exa_api_key.txt:ro

volumes:
  exa_proxy_data:
