# One-click deployment: copy .env.example → .env, configure your tokens and encryption secret, then run:
#   docker compose -f docker-compose.deploy.yml up -d
#
# Keys can be added via the admin API (POST /_proxy/keys) — stored encrypted in SQLite.
# Alternatively, set EXA_KEYS in .env for env-based key loading.
#
# For external access, change the port binding from "127.0.0.1:8787" to "8787"
# or place behind a reverse proxy (Caddy/Nginx) for HTTPS termination.

services:
  exa-proxy:
    image: al1ya/exa-reverse-proxy:latest
    container_name: exa-proxy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      EXA_STATE_PATH: /data/exa-proxy.sqlite
    volumes:
      - exa_proxy_data:/data

volumes:
  exa_proxy_data:
